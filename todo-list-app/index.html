<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced To-Do List App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-check-circle"></i> TaskMaster Pro</h1>
            <p class="subtitle">Organize your tasks efficiently with style</p>
            <div class="date-display">
                <span id="currentDate"></span>
            </div>
        </header>

        <main>
            <!-- Input section for adding new tasks -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="What needs to be done?" 
                        class="task-input"
                    >
                    <select id="taskCategory" class="category-select">
                        <option value="personal">Personal</option>
                        <option value="work">Work</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="input-actions">
                    <input type="date" id="taskDueDate" class="due-date-input">
                    <button id="addTaskBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- Task statistics -->
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-tasks"></i>
                    <div class="stat-info">
                        <span class="stat-label">Total Tasks</span>
                        <span class="stat-value" id="totalTasks">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div class="stat-info">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value" id="completedTasks">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div class="stat-info">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value" id="pendingTasks">0</span>
                    </div>
                </div>
            </div>

            <!-- Filter and search section -->
            <div class="filter-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search tasks..."
                        class="search-input"
                    >
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-spinner"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check"></i> Completed
                    </button>
                </div>
            </div>

            <!-- Category filter pills -->
            <div class="category-pills" id="categoryPills">
                <button class="pill active" data-category="all">All</button>
                <button class="pill" data-category="personal">Personal</button>
                <button class="pill" data-category="work">Work</button>
                <button class="pill" data-category="shopping">Shopping</button>
                <button class="pill" data-category="health">Health</button>
                <button class="pill" data-category="other">Other</button>
            </div>

            <!-- Task list container -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2>Your Tasks</h2>
                    <div class="tasks-actions">
                        <button id="sortBtn" class="icon-btn" title="Sort by date">
                            <i class="fas fa-sort-amount-down"></i>
                        </button>
                        <button id="clearCompletedBtn" class="icon-btn" title="Clear completed">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                
                <div id="taskList" class="task-list">
                    <!-- Tasks will be dynamically added here -->
                </div>
                
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <p>No tasks yet. Add your first task above!</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p><i class="fas fa-save"></i> Tasks are auto-saved in your browser</p>
                <div class="footer-stats">
                    <span id="totalTasksFooter">0</span> total | 
                    <span id="completedTasksFooter">0</span> completed
                </div>
            </div>
        </footer>
    </div>

    <!-- Toast notification container -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
